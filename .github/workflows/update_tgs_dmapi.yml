name: Update TGS DMAPI

on:
  schedule:
    - cron: "0 0 * * *"
  workflow_dispatch:

jobs:
  update-dmapi:
    runs-on: ubuntu-24.04
    name: Update the TGS DMAPI
    permissions:
      contents: write
      pull-requests: write
    steps:
      - name: Clone
        uses: actions/checkout@v7

      - name: Branch
        run: |
          git branch -f tgs-dmapi-update
          git checkout tgs-dmapi-update
          git reset --hard master

      - name: Apply DMAPI update
        uses: tgstation/tgs-dmapi-updater@v2
        id: dmapi-update
        with:
          header-path: "code/__DEFINES/tgs.dm"
          library-path: "code/modules/tgs"

      - name: Commit and Push
        id: commit-and-push
        continue-on-error: true
        run: |
          git config user.name "tgstation-ci[bot]"
          git config user.email "179393467+tgstation-ci[bot]@users.noreply.github.com"
          git add .
           if git diff --cached --quiet; then
             echo "Aucune modification à committer"
           else
             git commit -m 'Mise à jour du TGS DMAPI'
             git push -f -u origin tgs-dmapi-update
           fi

      - name: Generate App Token
        id: app-token-generation
        uses: actions/create-github-app-token@v3.2.0
        if: env.APP_PRIVATE_KEY != '' && env.APP_ID != ''
        with:
          client-id: ${{ secrets.APP_ID }}
          private-key: ${{ secrets.APP_PRIVATE_KEY }}
        env:
          APP_PRIVATE_KEY: ${{ secrets.APP_PRIVATE_KEY }}
          APP_ID: ${{ secrets.APP_ID }}

      - name: Create Pull Request
        uses: repo-sync/pull-request@v2
        if: always()
        with:
          source_branch: "tgs-dmapi-update"
          destination_branch: "master"
          pr_title: "Automatic TGS DMAPI Update"
          pr_body: "This pull request updates the TGS DMAPI. Latest release notes:\n\n${{ steps.dmapi-update.outputs.release-notes }}"
          pr_label: "Tools"
          pr_allow_empty: true
          github_token: ${{ steps.app-token-generation.outputs.token || secrets.GITHUB_TOKEN }}